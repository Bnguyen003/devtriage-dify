<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTriage - AI GitHub Issue Triage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 800px; width: 100%; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; color: #58a6ff; margin-bottom: 10px; }
        .header p { color: #8b949e; font-size: 1.1em; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #c9d1d9;
            font-size: 16px;
        }
        input::placeholder { color: #484f58; }
        button {
            padding: 15px 25px;
            border-radius: 10px;
            border: none;
            background: #238636;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #2ea043; }
        button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .result {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            display: none;
            line-height: 1.6;
        }
        .result.show { display: block; }
        .result h2 {
            color: #58a6ff;
            border-bottom: 1px solid #21262d;
            padding-bottom: 10px;
            margin: 20px 0 10px;
        }
        .result h3 { color: #58a6ff; margin: 15px 0 8px; }
        .result a { color: #58a6ff; text-decoration: none; }
        .result a:hover { text-decoration: underline; }
        .result strong { color: #e6edf3; }
        .result ul { padding-left: 20px; margin: 10px 0; }
        .result li { margin: 5px 0; }
        .result blockquote {
            border-left: 3px solid #30363d;
            padding-left: 15px;
            color: #8b949e;
            margin: 10px 0;
            font-style: italic;
        }
        .result hr { border-color: #21262d; margin: 20px 0; }
        .result p { margin: 8px 0; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
            display: none;
        }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid #30363d;
            border-top: 3px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #49020233;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .error.show { display: block; }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #484f58;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DevTriage</h1>
            <p>AI-Powered GitHub Issue Triage — Paste an Issue link to get started</p>
        </div>

        <div class="input-group">
            <input type="text" id="issueUrl" placeholder="Example:https://github.com/facebook/react/issues/29900">
            <button onclick="analyzeIssue()">Analyze</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing issue, please wait...</p>
        </div>

        <div class="error" id="error"></div>
        <div class="result" id="result"></div>

        <div class="footer">
            Powered by <strong>Dify x EdgeOne</strong> | #DifyxEdgeOneBestPracticeShowcase
        </div>
    </div>

    <script>
        const API_URL = '/api/analyze';

        async function analyzeIssue() {
            const url = document.getElementById('issueUrl').value.trim();
            if (!url) return;

            document.getElementById('result').classList.remove('show');
            document.getElementById('result').innerHTML = '';
            document.getElementById('error').classList.remove('show');
            document.getElementById('loading').classList.add('show');
            document.querySelector('button').disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        issue_url: url
                    })
                });

                const data = await response.json();

                if (data.data && data.data.outputs && data.data.outputs.result) {
                    displayResult(data.data.outputs.result);
                } else {
                    throw new Error('No result received from Dify');
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Error: ' + err.message;
                document.getElementById('error').classList.add('show');
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.querySelector('button').disabled = false;
            }
        }

        function displayResult(markdown) {
            let html = markdown;

            // Convert Markdown headings to HTML
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1 style="font-size: 1.5em; color: #58a6ff;">$1</h1>');

            // Convert bold
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Convert italic
            html = html.replace(/_(.+?)_/g, '<em>$1</em>');

            // Convert links
            html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Convert horizontal rules
            html = html.replace(/^---$/gm, '<hr>');

            // Convert unordered lists (lines starting with - or *)
            html = html.replace(/^(\s*)[-*] (.+)$/gm, '$1<li>$2</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Convert ordered lists (lines starting with 1. 2. etc)
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // Convert line breaks
            html = html.replace(/\n\n/g, '<br><br>');
            html = html.replace(/\n/g, '<br>');

            document.getElementById('result').innerHTML = html;
            document.getElementById('result').classList.add('show');
        }

        document.getElementById('issueUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') analyzeIssue();
        });
    </script>
</body>
</html>
